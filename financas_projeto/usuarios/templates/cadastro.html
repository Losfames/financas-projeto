<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'usuarios/style.css' %}">
</head>

<body class="login">
<div class="layout">

    <div class="lado-esquerdo">
        <div class="quadrado">
            <div class="titulo-container">
                <h1 class="nome">+Controle</h1>
                <h1 class="nome2">-Tempo</h1>
            </div>
            {% if erro %}
                <p class="user" style="color: #b91c1c; text-align: center;">{{ erro }}</p>
            {% endif %}
            <form method="POST">
                {% csrf_token %}

                <p class="user" style="color: #285E9E;">Nome completo</p>
                <input class="lemail" name="nome" value="{{ dados.nome }}" placeholder="Digite seu nome completo..."><br>

                <p class="user" style="color: #285E9E;">Email</p>
                <input class="lemail" name="email" value="{{ dados.email }}" placeholder="Digite seu email..."><br>

                <p class="user" style="color: #285E9E;">Senha</p><div class="campo-senha">
                <input class="lemail" name="senha" id="senha" type="password" value="{{ dados.senha }}" placeholder="Digite sua senha...">
                <button type="button" class="toggle-password" onclick="toggleSenha()">
                    <span id="icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                        <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </span>

                </button>


                <script>
                function toggleSenha() {
                    const input = document.getElementById("senha");
                    const btn = document.getElementById("icon");
                    if (input.type === "password") {
                        input.type = "text";
                        icon.innerHTML = `
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M3 3l18 18"/>
                                <path d="M10.58 10.58a2 2 0 0 0 2.83 2.83"/>
                                <path d="M9.88 5.08A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-3.17 4.66"/>
                                <path d="M6.61 6.61A21.8 21.8 0 0 0 1 12s4 8 11 8a10.94 10.94 0 0 0 5.39-1.39"/>
                            </svg>
                        `;
                    } else {
                        input.type = "password";
                        icon.innerHTML = `
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        `;
                    }
                }
                </script>
                </div>
                <p class="user" style="color: #285E9E;">CPF</p>
                <input
                    class="lemail"
                    name="cpf"
                    inputmode="numeric"
                    maxlength="11"
                    pattern="[0-9]{11}"
                    required
                    value="{{ dados.cpf }}"
                    placeholder="Digite seu CPF..."
                ><br>


                <button class="entrar" type="submit">Cadastrar</button>

                <p class="login-link">
                Já tem conta?
                <a href="{% url 'login' %}">Fazer login</a>
                </p>
            </form>
        </div>
    </div>
        <div class="lado-direito">
        
        <p class="txtimg">
            Tenha controle total sobre suas finanças
        </p>
        <p class="txtimg2">
            onde e quando quiser.
        </p>
        </div>
    </div>
<script src="{% static 'usuarios/site-modal.js' %}"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    // Pega o formulário da página de cadastro
    const formCadastro = document.querySelector("form");

    if(formCadastro) {
        const cpfInput = document.querySelector('input[name="cpf"]');

        if (cpfInput) {
            cpfInput.addEventListener("input", function() {
                this.value = this.value.replace(/\D/g, "").slice(0, 11);
            });
        }

        formCadastro.addEventListener("submit", function(event) {
            // Pegando os campos do HTML
            const nomeInput = document.querySelector('input[name="nome"]');
            const emailInput = document.querySelector('input[name="email"]');
            const senhaInput = document.getElementById("senha");
            
            // Pegando os valores digitados (e tirando espaços em branco nas pontas com trim)
            const nome = nomeInput ? nomeInput.value.trim() : "";
            const email = emailInput ? emailInput.value.trim() : "";
            const senha = senhaInput ? senhaInput.value.trim() : "";
            const cpf = cpfInput ? cpfInput.value.replace(/\D/g, "") : "";
            
            const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; // Fórmula para validar e-mail
            let mensagensErro = [];

            // 1. Validação de Nome
            if (!nome) {
                mensagensErro.push("- O campo de nome completo é obrigatório.");
            }

            // 2. Validação de E-mail
            if (!email) {
                mensagensErro.push("- O campo de e-mail é obrigatório.");
            } else if (!regexEmail.test(email)) {
                mensagensErro.push("- Por favor, digite um formato de e-mail válido.");
            }

            // 3. Validação de Senha
            if (!senha) {
                mensagensErro.push("- A senha é obrigatória.");
            } else if (senha.length < 6) {
                mensagensErro.push("- A senha deve ter pelo menos 6 caracteres.");
            }

            // 4. Validacao de CPF: deve ter exatamente 11 digitos
            if (!cpf) {
                mensagensErro.push("- O campo de CPF é obrigatório.");
            } else if (cpf.length !== 11) {
                mensagensErro.push("- Digite um CPF válido com exatamente 11 números.");
            }

            // Se houver erros, impede o envio e mostra o alerta
            if (mensagensErro.length > 0) {
                event.preventDefault(); 
                siteAlert(mensagensErro.join("\n"), "Corrija os dados");
            }
        });
    }
});
</script>
</body>
</html>
