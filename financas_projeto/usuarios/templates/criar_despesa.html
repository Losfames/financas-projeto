<h1>Nova Despesa</h1>

{% if erro %}
    <p style="color:red;">{{ erro }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="text" name="descricao" placeholder="Descrição"><br>

    <input type="number" step="0.01" name="valor_orcado" placeholder="Valor Orçado"><br>

    <input type="number" step="0.01" name="valor_realizado" placeholder="Valor Realizado"><br>

    <input type="date" name="data"><br>

    <select name="categoria">
        {% for categoria in categorias %}
            <option value="{{ categoria.id }}">
                {{ categoria.nome }}
            </option>
        {% endfor %}
    </select><br>

    <select name="tipo">
        <option value="">Selecione um tipo</option>
        {% for tipo in tipos %}
            <option value="{{ tipo.id }}">
                {{ tipo.nome }}
            </option>
        {% endfor %}
    </select><br>

    <input type="text" name="tipo_nome" placeholder="Ou criar novo tipo"><br>

    <button type="submit">Salvar</button>
</form>
