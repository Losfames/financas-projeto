<h1>Criar Projeto</h1>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="nome" placeholder="Nome"><br>
    <input type="text" name="descricao" placeholder="Descrição"><br>
    <input type="date" name="data_inicio"><br>
    <input type="date" name="data_fim"><br>

    <button type="submit">Salvar</button>
</form>
